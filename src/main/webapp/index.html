<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vai Ter Aula Hoje?</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

<main class="main-container">

    <section class="login-card">

        <div class="logo-wrapper">
            <img src="img/logo.jpeg" alt="Coruja sobre livros com o texto Vai Ter Aula Hoje?" class="logo-image">
        </div>

        <h1 class="card-title">ACESSAR CONTA</h1>

        <form class="login-form" action="login" method="POST">

            <div class="input-group">
                <label for="email" class="input-label">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" class="input-field" required>
            </div>

            <div class="input-group">
                <label for="password" class="input-label">Senha:</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="senha" placeholder="Password" class="input-field password-input" required>
                    <span class="material-symbols-outlined password-toggle-icon" id="togglePassword" style="user-select: none;">visibility_off</span>
                </div>
            </div>

            <button type="submit" class="login-button">ENTRAR</button>

        </form>


    </section>

    <div class="pixel-decoration top-left"></div>
    <div class="pixel-decoration bottom-right"></div>

</main>

<script src="js/script.js"></script>
</body>
</html>
